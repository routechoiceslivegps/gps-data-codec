name: Python

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build wheels
      run: |
        export RUSTFLAGS='-C target-cpu=skylake'
        docker run --rm -v $(pwd):/io \
          ghcr.io/pyo3/maturin \
          build --release --compatibility manylinux_2_28 -i python3.10 -i python3.11 -i python3.12 -i python3.14 -i python3.13
    - uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    - name: Install built wheel
      run: |
        pip install gps_data_codec --no-index --find-links target/wheels --force-reinstall
        python test.py
    - name: Archive wheels
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: target/wheels/*

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux]
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@master
        with:
          user: __token__
          password: ${{ secrets.pypi_password }}
